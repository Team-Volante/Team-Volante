<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Buggy Interaction</title>

    <!-- Google Font for Game-Like Text -->
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />

    <link href="buggy.css" rel="stylesheet" />
  </head>
  <body>
    <!-- Main Content -->
    <div class="container">
      <!-- Title -->
      <h1>Interact with Our <span class="highlight">Buggy</span></h1>

      <!-- Canvas-Like Frame for Spline Viewer -->
      <div class="frame">
        <script
          type="module"
          src="https://unpkg.com/@splinetool/viewer@1.9.51/build/spline-viewer.js"
        ></script>
        <spline-viewer
          url="https://prod.spline.design/0q5xJrZ72p8LiKEO/scene.splinecode"
        ></spline-viewer>
      </div>

      <!-- Footer Text -->
      <p class="footer-text">
        To experience the <span class="highlight">real buggy</span>, come to the
        lab!
      </p>
    </div>
  </body>
</html>
